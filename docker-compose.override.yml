# docker-compose.override.yml — adds automated backup service.
# This file is automatically loaded by `docker compose up` alongside
# docker-compose.yml. Remove or rename to disable backup scheduling.

services:
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-trpm_lims}
      POSTGRES_USER: ${POSTGRES_USER:-lims}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      BACKUP_DIR: /backups
      RETENTION_DAYS: "30"
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - ./scripts/restore_drill.sh:/scripts/restore_drill.sh:ro
      - backup_data:/backups
    # Run backup daily at 02:00 UTC via a simple shell loop.
    entrypoint: /bin/sh
    command:
      - -c
      - |
        chmod +x /scripts/backup.sh /scripts/restore_drill.sh
        echo "Backup service started. Running daily at 02:00 UTC."
        while true; do
          # Sleep until 02:00 UTC
          current_hour=$$(date -u +%H)
          current_min=$$(date -u +%M)
          target_sec=$$(( (26 - current_hour) % 24 * 3600 + (0 - current_min) * 60 ))
          [ $$target_sec -le 0 ] && target_sec=$$((target_sec + 86400))
          echo "[$(date)] Next backup in $$target_sec seconds."
          sleep $$target_sec
          /scripts/backup.sh
        done

volumes:
  backup_data:
