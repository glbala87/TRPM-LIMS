# TRPM-LIMS nginx reverse proxy — reference configuration.
#
# This example terminates plain HTTP on port 80 for local docker-compose
# preview. In production, put this behind a TLS-terminating load balancer
# (ALB / Cloudflare / managed ingress) or uncomment the TLS block and mount
# real certificates.

upstream trpm_app {
    server app:8000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50m;

    # Django serves /static/ itself via WhiteNoise, so we just proxy everything.
    # Media files (user uploads) are served directly by nginx for performance.
    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://trpm_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# ---------------------------------------------------------------------------
