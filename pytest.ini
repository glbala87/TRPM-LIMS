[pytest]
DJANGO_SETTINGS_MODULE = lims.settings
python_files = tests.py test_*.py *_tests.py
addopts =
    --reuse-db
    --tb=short
    -ra
    --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    smoke: smoke tests that verify imports, models instantiate, and key endpoints respond
    integration: integration tests that exercise multiple components together
